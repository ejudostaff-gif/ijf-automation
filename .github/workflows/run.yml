name: IJF Automation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      # ====== 必須 ======
      SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
      SHEET_NAME: データベース

      # ====== 列設定 ======
      SEARCH_COL: F          # 検索対象（氏名）
      OUTPUT_COL: Q          # IJF URL出力列
      JUDOINSIDE_COL: P      # JudoInside URL出力列
      BIRTH_COL: M           # 誕生日出力列

      # ====== 行範囲 ======
      START_ROW: 2
      END_ROW: 3500

      # ====== 機能ON/OFF ======
      ENABLE_JUDOINSIDE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install gspread google-auth requests beautifulsoup4

      - name: Create credentials.json
        run: |
          cat << 'EOF' > credentials.json
          ${{ secrets.GOOGLE_CREDENTIALS }}
          EOF

      - name: Run script
        run: |
          python -u main.py
